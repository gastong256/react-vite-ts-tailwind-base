name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint · Typecheck · Test · Build · E2E
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        # version is read automatically from packageManager in package.json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          # cache: pnpm is intentionally omitted — it requires pnpm-lock.yaml,
          # which does not exist in a fresh template clone.
          # We cache the pnpm store manually below using package.json as the key.

      - name: Get pnpm store path
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Auto-init template (if not already initialized)
        run: |
          if [ -f ".template-sentinel" ]; then
            echo "Template not initialized — running init in CI mode..."
            CI=true \
            TEMPLATE_PROJECT_NAME="CI App" \
            TEMPLATE_PROJECT_SLUG="ci-app" \
            TEMPLATE_OWNER="ci" \
            TEMPLATE_DESCRIPTION="CI test run" \
            TEMPLATE_API_BASE_URL="http://localhost:8000/api" \
            bash scripts/init.sh
          else
            echo "Template already initialized — skipping init."
          fi

      - name: Install dependencies
        # Use --frozen-lockfile only when a lockfile already exists
        # (initialized projects). Fresh template clones have none.
        run: |
          if [ -f "pnpm-lock.yaml" ]; then
            pnpm install --frozen-lockfile
          else
            pnpm install
          fi

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test --reporter=verbose

      - name: Build
        run: pnpm build

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: E2E tests
        run: pnpm test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: coverage/
          retention-days: 7
